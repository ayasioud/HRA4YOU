<div class="col-xl-12">
  <app-card cardTitle="Les types d'instance" [options]="false" blockClass="table-border-style">
    <div class="d-flex justify-content-between align-items-center mb-3">
      

      
    </div>

    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Nom</th>
            <th>Description</th>
            <th>Actif</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of paginatedInstanceTypes">
            <td>{{ item.name }}</td>
            <td>{{ item.description || '-' }}</td>
            <td>
              <span class="badge bg-success" *ngIf="item.is_active">Actif</span>
              <span class="badge bg-secondary" *ngIf="!item.is_active">Inactif</span>
            </td>
            <td>
              <button
                type="button"
                class="btn btn-icon btn-success me-2"
                *ngIf="!item.is_active"
                (click)="toggleStatus(item)"
                title="Activer"
              >
                <i class="feather icon-check-circle"></i>
              </button>

              <button
                type="button"
                class="btn btn-icon btn-warning me-2"
                *ngIf="item.is_active"
                (click)="toggleStatus(item)"
                title="Desactiver"
              >
                <i class="feather icon-slash"></i>
              </button>

              <button
                type="button"
                class="btn btn-icon btn-danger"
                (click)="deleteInstanceType(item.id)"
                title="Supprimer"
              >
                <i class="feather icon-trash-2"></i>
              </button>
            </td>
          </tr>

          <tr *ngIf="instanceTypes.length === 0">
            <td colspan="4" class="text-center text-muted">
              Aucun type d'instance trouve.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <nav aria-label="Pagination utilisateurs" class="d-flex justify-content-center mt-3" *ngIf="!isLoading && totalPages > 1">
      <ul class="pagination mb-0">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage - 1)">
            Previous
          </a>
        </li>

        <li
          class="page-item"
          *ngFor="let page of pages"
          [class.active]="page === currentPage"
        >
          <a class="page-link" href="javascript:void(0)" (click)="goToPage(page)">
            {{ page }}
          </a>
        </li>

        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage + 1)">
            Next
          </a>
        </li>
      </ul>
    </nav>

    <button
        type="button"
        class="btn btn-primary"
        (click)="openAddTypeModal(addTypeModal)"
      >
        <i class="feather icon-plus"></i>
        Ajouter un type
      </button>
  </app-card>
</div>

<ng-template #addTypeModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Ajouter un type d'instance</h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss()"
    ></button>
  </div>

  <form #typeForm="ngForm" (ngSubmit)="createInstanceType(modal)">
    <div class="modal-body">
      <div class="alert alert-danger" *ngIf="errorMessage">
        <pre class="mb-0">{{ errorMessage }}</pre>
      </div>

      <div class="form-group">
        <label for="typeName">Nom <span class="text-danger">*</span></label>
        <input
          type="text"
          class="form-control"
          [class.is-invalid]="typeName.invalid && typeName.touched"
          [class.is-valid]="typeName.valid && typeName.touched"
          id="typeName"
          name="typeName"
          [(ngModel)]="newInstanceType.name"
          placeholder="Ex: t2.large"
          #typeName="ngModel"
          required
          minlength="3"
          maxlength="50"
        />

        <div class="invalid-feedback" *ngIf="typeName.errors && typeName.touched">
          <span *ngIf="typeName.errors['required']">Le nom est obligatoire.</span>
          <span *ngIf="typeName.errors['minlength']">Minimum 3 caracteres.</span>
          <span *ngIf="typeName.errors['maxlength']">Maximum 50 caracteres.</span>
        </div>
      </div>

      <div class="form-group mt-3">
        <label for="typeDescription">Description</label>
        <textarea
          class="form-control"
          id="typeDescription"
          name="typeDescription"
          [(ngModel)]="newInstanceType.description"
          placeholder="Ex: Type standard"
          rows="3"
        ></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="modal.dismiss()"
      >
        <i class="feather icon-x"></i>
        Annuler
      </button>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="typeForm.invalid || isCreating"
      >
        <i class="feather icon-check"></i>
        {{ isCreating ? 'Ajout...' : 'Enregistrer' }}
      </button>
    </div>
  </form>
</ng-template>
