<div class="auth-wrapper">
  <div class="auth-content">
    <div class="auth-bg">
      <span class="r"></span>
      <span class="r s"></span>
      <span class="r s"></span>
      <span class="r"></span>
    </div>

    <div class="card">
      <div class="card-body text-center">

        <div class="mb-4">
          <i class="feather icon-unlock auth-icon"></i>
        </div>

        <h3 class="mb-4">Login</h3>

        <!-- Bouton SSO Crowd -->
        <button
          type="button"
          class="btn btn-primary w-100 mb-3 d-flex align-items-center justify-content-center gap-2"
          (click)="onLoginWithCrowd()"
          [disabled]="isCrowdLoading"
        >
          <i class="feather icon-user"></i>
          {{ isCrowdLoading ? 'Redirection...' : 'Se connecter avec Crowd' }}
        </button>

        <!-- Séparateur -->
        <div class="d-flex align-items-center mb-3 gap-2">
          <hr class="flex-grow-1 m-0">
          <span class="text-muted" style="font-size: 12px;">ou connexion admin</span>
          <hr class="flex-grow-1 m-0">
        </div>

        <!-- Formulaire classique -->
        <form (ngSubmit)="onLogin()">
          <div class="input-group mb-3">
            <input
              type="text"
              class="form-control"
              placeholder="Username"
              name="username"
              [(ngModel)]="username"
              required
            />
          </div>

          <div class="input-group mb-3">
            <input
              type="password"
              class="form-control"
              placeholder="Password"
              name="password"
              [(ngModel)]="password"
              required
            />
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-3">
            {{ errorMessage }}
          </div>

          <button
            type="submit"
            class="btn btn-secondary w-100 mb-4"
            [disabled]="isLoading"
          >
            {{ isLoading ? 'Connexion...' : 'Login admin' }}
          </button>
        </form>

      </div>
    </div>
  </div>
</div>
